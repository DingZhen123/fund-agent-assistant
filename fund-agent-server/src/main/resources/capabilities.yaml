capabilities:
  finance.payment.query:
    nodeType: QUERY
    domain: finance
    intents:
      - query
    description: 查询付款状态、付款金额、收付款方、付款时间和回单可用性
    bindableTools:
      - queryPaymentDocuments
      - payment_status_query_mock
    enabled: true

  finance.receipt.send:
    nodeType: ACTION
    domain: finance
    intents:
      - send
      - download
    description: 发送或下载付款回单文件
    bindableTools:
      - sendReceiptFiles
    enabled: true

  reason.general:
    nodeType: LLM_REASON
    domain: general
    intents:
      - reason
      - analyze
      - summarize
    description: 不调用外部工具，基于已有上下文和Observation生成结构化中间分析结果
    bindableTools: []
    enabled: true

  conversation.answer:
    nodeType: FINAL_ANSWER
    domain: general
    intents:
      - answer
    description: 根据已有上下文、节点执行结果和验证结论生成最终用户回复
    bindableTools: []
    enabled: true

  user.ask_clarification:
    nodeType: ASK_USER
    domain: general
    intents:
      - ask
    description: 缺少必要信息时向用户追问
    bindableTools: []
    enabled: true

  common.echo:
    nodeType: QUERY
    domain: common
    intents:
      - echo
      - debug
    description: 原样返回输入文本，用于验证工具连通性
    bindableTools:
      - echo
    enabled: true

  common.time.current:
    nodeType: QUERY
    domain: common
    intents:
      - time
      - query
    description: 查询指定时区的当前时间
    bindableTools:
      - current_time
    enabled: true

  common.uuid.generate:
    nodeType: QUERY
    domain: common
    intents:
      - generate
      - uuid
    description: 生成随机UUID
    bindableTools:
      - generate_uuid
    enabled: true

  common.text.stats:
    nodeType: QUERY
    domain: common
    intents:
      - text
      - stats
    description: 统计文本长度、去空格长度和行数
    bindableTools:
      - text_stats
    enabled: true

  common.calculate.simple:
    nodeType: QUERY
    domain: common
    intents:
      - calculate
      - math
    description: 执行简单四则运算
    bindableTools:
      - simple_calculator
    enabled: true

  common.json.get_field:
    nodeType: QUERY
    domain: common
    intents:
      - json
      - extract
    description: 从简单JSON对象中读取顶层字段
    bindableTools:
      - json_get_field
    enabled: true
